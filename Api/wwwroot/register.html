<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – AGPPA</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="nav">
        <a href="/"><h1>AGPPA</h1></a>
        <nav>
            <a href="/">Home</a>
            <a href="/athletes.html">Athletes</a>
            <a href="/teams.html">Teams</a>
            <a href="/games.html">Games</a>
            <a href="/stats.html">Stats</a>
            <span id="navAuth"></span>
        </nav>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Register (viewer account)</h2>
            <p class="muted">Creates a read-only user. The super admin adds team admins under Users.</p>

            <form id="registerForm">
                <label for="regUser">Username</label>
                <input type="text" id="regUser" required maxlength="50" autocomplete="username" />

                <label for="regPass">Password (min. 6)</label>
                <input type="password" id="regPass" required minlength="6" autocomplete="new-password" />

                <label for="regEmail">Email (optional)</label>
                <input type="text" id="regEmail" maxlength="100" />

                <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <button type="submit" class="secondary">Register</button>
                    <a href="/login.html" class="secondary">Already have an account? Sign in</a>
                </div>

                <p id="regError" class="msg-error"></p>
                <p id="regOk" class="msg-ok"></p>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/register.js"></script>
</body>
</html>
