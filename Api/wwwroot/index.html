<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGPPA</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="nav">
        <a href="/"><h1>AGPPA</h1></a>
        <nav>
            <a href="/">Home</a>
            <a href="/athletes.html">Athletes</a>
            <a href="/teams.html">Teams</a>
            <a href="/games.html">Games</a>
            <span id="navAuth"></span>
        </nav>
    </div>
    <div class="container">
        <div class="panel">
            <h2>Dashboard</h2>
            <p class="muted">Lists are always visible. Changing teams requires sign-in (super admin or team admin). Only the super admin can change athletes.</p>
            <p><a href="/login.html">Sign in / Register</a></p>
        </div>
        <div class="panel" id="athleteDashboard">
            <h2>Athlete Percentiles</h2>
            <div id="dashboardContent">
                <p class="muted">Loading athlete data...</p>
            </div>
        </div>
    </div>

    <div id="detailModal" class="detail-modal" aria-hidden="true">
        <div class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
            <button id="closeDetailModal" class="close-detail" aria-label="Close athlete detail">×</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
