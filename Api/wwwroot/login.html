<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AGPPA</title> 
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body>
        <div class="login">
            <h1>AGPPA</h1>
            <form id="loginForm" class="loginForm">
                <label for="username">Username</label>
                <input type="text" id="username" maxlength="50" placeholder="Enter your username" required />
                <label for="password">Password</label>
                <input type="password" id="password" maxlength="50" placeholder="Enter your password" required /><br />
                <button type="submit">Login</button>
                <a href="/register.html" class="secondary">Don't have an account? Register</a>
            </form>
        </div>
        <script src="./js/login.js"></script>
    </body>
</html>
